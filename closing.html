<!doctype html> <html lang="ar" dir="rtl"> <head> <meta charset="utf-8"> <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"> <meta name="theme-color" content="#06386B"> <meta name="robots" content="noindex,nofollow,noarchive"> <title>الإقفال الشهري — قمم افريست</title> <style> :root{--navy:#06386B;--blue:#0964A5;--soft:#EAF3FB;--ink:#172033;--muted:#687386;--line:#DCE4EC;--bg:#F3F6F9;--green:#087443;--red:#B42318;--amber:#A15C00;--shadow:0 14px 32px rgba(6,56,107,.12)} *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--ink)}button,input{font:inherit}button{cursor:pointer}.hidden{display:none!important} .login{min-height:100vh;display:grid;place-items:center;padding:18px}.card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 7px 18px rgba(15,45,75,.05)}.login-card{width:min(430px,100%);padding:26px;box-shadow:var(--shadow)} .logo{display:block;width:126px;height:126px;object-fit:contain;margin:0 auto 10px}.title{text-align:center;color:var(--navy);font-size:25px;margin:0 0 6px}.sub{text-align:center;color:var(--muted);line-height:1.7} label{display:grid;gap:7px;margin:12px 0;font-weight:800;font-size:14px}input{width:100%;border:1px solid #C7D3DF;border-radius:13px;padding:12px;background:#fff;min-height:48px} .btn{border:0;border-radius:13px;min-height:44px;padding:10px 13px;font-weight:900}.primary{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff}.soft{background:var(--soft);color:var(--navy)}.success{background:#E8F7EF;color:var(--green)}.danger{background:#FFF0EF;color:var(--red)}.wide{width:100%} .error{margin-top:12px;padding:12px;border-radius:12px;background:#FFF1F0;color:var(--red);border:1px solid #F2C5C0}.loader{width:36px;height:36px;margin:20px auto;border:4px solid #DBE7F1;border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}} .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 14px;background:rgba(255,255,255,.95);border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:10px}.top-logo{width:50px;height:50px;object-fit:contain}.brand strong{display:block;color:var(--navy)}.brand small{display:block;color:var(--muted);margin-top:4px}.logout{width:44px;height:44px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--navy)} .wrap{width:min(1200px,100%);margin:auto;padding:18px 14px 34px}.toolbar{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end}.summary{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}.metric{background:#fff;border:1px solid var(--line);border-radius:15px;padding:12px}.metric span{display:block;color:var(--muted);font-size:12px}.metric strong{display:block;color:var(--navy);font-size:20px;margin-top:4px} .list{display:grid;gap:12px}.employee{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}.top{display:flex;justify-content:space-between;gap:10px}.name{color:var(--navy);font-weight:900}.muted{color:var(--muted);font-size:13px;line-height:1.7}.totals{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}.total{background:#F7F9FB;border:1px solid var(--line);border-radius:12px;padding:9px}.total span{display:block;color:var(--muted);font-size:11px}.total strong{display:block;margin-top:3px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px}.status{display:inline-block;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900}.open{background:#FFF4DF;color:var(--amber)}.closed{background:var(--soft);color:var(--navy)}.approved{background:#E8F7EF;color:var(--green)}.toast{position:fixed;right:14px;left:14px;bottom:16px;z-index:60;max-width:540px;margin:auto;padding:13px;border-radius:13px;background:#172033;color:#fff;text-align:center} @media(min-w
