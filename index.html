<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#073d70">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>نظام قمم افريست</title>
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    *{box-sizing:border-box}html,body{min-height:100%;margin:0}body{font-family:Tahoma,"Segoe UI",Arial,sans-serif;background:#f4f7fb;color:#13233a;display:grid;place-items:center;padding:24px}
    .card{width:min(100%,460px);background:#fff;border:1px solid #dce5ef;border-radius:24px;padding:34px 24px;text-align:center;box-shadow:0 18px 45px #073d7020}
    .mark{width:74px;height:74px;border-radius:22px;background:#073d70;color:#fff;display:grid;place-items:center;font-size:40px;font-weight:900;margin:0 auto 18px}
    h1{font-size:24px;color:#073d70;margin:0 0 8px}p{color:#64748b;line-height:1.8;margin:0 0 20px}.spinner{width:40px;height:40px;border:4px solid #dbe7f2;border-top-color:#073d70;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}@keyframes spin{to{transform:rotate(360deg)}}
    a{display:block;text-decoration:none;background:#073d70;color:#fff;padding:14px 18px;border-radius:13px;font-weight:900;min-height:48px}.note{font-size:12px;margin:14px 0 0;color:#8290a3}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">ق</div>
    <h1>نظام قمم افريست</h1>
    <p>جاري فتح بوابة النظام الآمنة مباشرة…</p>
    <div class="spinner" aria-label="جاري التحميل"></div>
    <a id="direct" href="#">فتح النظام الآن</a>
    <p class="note">إذا لم تنتقل الصفحة تلقائياً، اضغط الزر أعلاه.</p>
  </main>
  <script>
    const BACKEND='https://script.google.com/macros/s/AKfycbx2zSsltwFfx_evnsWhVhMxKjiK1VB1mkjngw0s7xKMybI20WH2TRYbmqh6i40PL6YTHw/exec';
    const params=new URLSearchParams(location.search);
    const route=location.hash.slice(1).trim().toLowerCase();
    const allowedRoutes=['worker','employee','hr','hrfinance','closing','sales','operations','employees'];
    if(!params.has('portal')&&allowedRoutes.includes(route)) params.set('portal',route);
    params.set('v','143');
    const target=BACKEND+'?'+params.toString();
    document.getElementById('direct').href=target;
    if('serviceWorker'in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
    setTimeout(()=>location.replace(target),700);
  </script>
</body>
</html>
